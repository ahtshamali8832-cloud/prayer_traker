<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verifying email…</title>
  <link rel="preconnect" href="https://tsqdcslqqxroppofhjzm.supabase.co" crossorigin />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f8fafc;
      color: #334155;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 320px;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin: 0; font-size: 16px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" aria-hidden="true"></div>
    <p id="msg">Verifying your email…</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.58.0/dist/umd/supabase.min.js"></script>
  <script>
    (function () {
      var msg = document.getElementById('msg');
      var SUPABASE_URL = 'https://tsqdcslqqxroppofhjzm.supabase.co';
      var SUPABASE_KEY = 'sb_publishable_Mu33iMxVzUgwsyNnAIS1Tg_qkFDYeqB';

      var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: {
          detectSessionInUrl: true,
          persistSession: true,
          autoRefreshToken: true,
          storage: window.localStorage,
        },
      });

      function go(path, text) {
        if (text) msg.textContent = text;
        window.location.replace(path);
      }

      supabase.auth.getSession().then(function (result) {
        if (result.data.session) {
          go('/dashboard', 'Email verified! Opening app…');
          return;
        }

        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');

        if (code) {
          return supabase.auth.exchangeCodeForSession(code).then(function (exchange) {
            if (exchange.error) throw exchange.error;
            if (exchange.data.session) {
              go('/dashboard', 'Email verified! Opening app…');
            } else {
              go('/login', 'Email verified. Please sign in.');
            }
          });
        }

        var hash = window.location.hash || '';
        if (hash.indexOf('access_token=') !== -1 || hash.indexOf('error=') !== -1) {
          return new Promise(function (resolve) {
            setTimeout(resolve, 300);
          }).then(function () {
            return supabase.auth.getSession();
          }).then(function (retry) {
            if (retry.data.session) {
              go('/dashboard', 'Email verified! Opening app…');
            } else if (hash.indexOf('error=') !== -1) {
              go('/login', 'Verification link expired. Please sign in or register again.');
            } else {
              go('/login', 'Email verified. Please sign in.');
            }
          });
        }

        go('/login', 'Email verified. Please sign in.');
      }).catch(function () {
        go('/login', 'Verification failed. Please try signing in.');
      });
    })();
  </script>
</body>
</html>
